<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;">

  <!-- Preview text (hidden in inbox) -->
  <div style="display:none;max-height:0;overflow:hidden;mso-hide:all;">[[PREVIEW_TEXT]]&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;</div>

  <div style="overflow:hidden;">
    <div style="background:{{ brandboards.b100 }};background-color:{{ brandboards.b100 }};border-width:0px;margin:0px auto 0px auto;border-color:transparent;border-radius:0px;max-width:600px;">

      <table align="center" border="0" cellpadding="0" cellspacing="0" role="presentation"
        style="background:{{ brandboards.b100 }};background-color:{{ brandboards.b100 }};width:100%;border-radius:0px;">
        <tbody>
          <tr>
            <td style="padding:20px 0 40px 0;border-color:transparent;direction:ltr;font-size:0px;text-align:center;">

              <div style="font-size:0px;text-align:left;direction:ltr;display:inline-block;vertical-align:top;width:100%;">
                <table border="0" cellpadding="0" cellspacing="0" role="presentation" width="100%">
                  <tbody>
                    <tr>
                      <td style="vertical-align:top;">
                        <table border="0" cellpadding="0" cellspacing="0" role="presentation" width="100%">
                          <tbody>

                            <!-- ── HEADLINE ── -->
                            <tr>
                              <td align="left" style="font-size:0px;padding:12px 24px;word-break:break-word;">
                                <div style="font-family:arial,helvetica,sans-serif;font-size:14px;line-height:1.25;text-align:left;color:#000000;">
                                  <h2 style="text-align:center;line-height:1.5;margin:0;">
                                    <span style="color:{{ brandboards.b975 }} !important;font-size:24px;">[[HEADLINE_TEXT]]</span>
                                  </h2>
                                </div>
                              </td>
                            </tr>

                            <!-- ── HERO IMAGE ── -->
                            <tr>
                              <td align="full" style="font-size:0px;padding:10px 20px;word-break:break-word;">
                                <table border="0" cellpadding="0" cellspacing="0" role="presentation"
                                  style="min-width:100%;max-width:100%;width:100%;border-collapse:collapse;">
                                  <tbody>
                                    <tr>
                                      <td style="border-radius:0px;">
                                        <a href="[[CTA_URL]]" target="_blank">
                                          <img height="auto" src="[[HERO_IMAGE_URL]]"
                                            style="border:0;border-radius:0px;display:block;outline:none;text-decoration:none;height:auto;min-width:100%;width:100%;max-width:100%;font-size:13px;"
                                            width="560">
                                        </a>
                                      </td>
                                    </tr>
                                  </tbody>
                                </table>
                              </td>
                            </tr>

                            <!-- ── SUBHEAD ── -->
                            <tr>
                              <td align="left" style="font-size:0px;padding:12px 32px 4px 32px;word-break:break-word;">
                                <div style="font-family:arial,helvetica,sans-serif;font-size:14px;line-height:1.25;text-align:left;color:#000000;">
                                  <p style="margin:0;line-height:1.5;">
                                    <span style="color:{{ brandboards.b975 }} !important;font-size:18px;font-family:arial,helvetica,sans-serif;font-weight:600;">[[SUBHEAD]]</span>
                                  </p>
                                </div>
                              </td>
                            </tr>

                            <!-- ── BODY TEXT ── -->
                            <tr>
                              <td align="left" style="font-size:0px;padding:8px 32px 12px 32px;word-break:break-word;">
                                <div style="font-family:arial,helvetica,sans-serif;font-size:14px;line-height:1.25;text-align:left;color:#000000;">
                                  <p style="margin:0;line-height:1.6;">
                                    <span style="color:{{ brandboards.b975 }} !important;font-size:16px;font-family:arial,helvetica,sans-serif;">[[BODY_TEXT]]</span>
                                  </p>
                                </div>
                              </td>
                            </tr>

                            <!-- ── BODY BLOCK 2 (optional) ── -->
                            [[BODY_BLOCK_2_SECTION]]

                            <!-- ── CLOSING LINE ── -->
                            <tr>
                              <td align="left" style="font-size:0px;padding:8px 32px 16px 32px;word-break:break-word;">
                                <div style="font-family:arial,helvetica,sans-serif;font-size:14px;line-height:1.25;text-align:left;color:#000000;">
                                  <p style="margin:0;line-height:1.5;font-style:italic;">
                                    <span style="color:{{ brandboards.b975 }} !important;font-size:16px;font-family:arial,helvetica,sans-serif;">[[CLOSING_LINE]]</span>
                                  </p>
                                </div>
                              </td>
                            </tr>

                            <!-- ── CTA BUTTON ── -->
                            <tr>
                              <td align="left" style="font-size:0px;padding:0px 0px 8px 0px;word-break:break-word;">
                                <div style="font-family:system-ui,-apple-system,sans-serif;font-size:13px;line-height:1;text-align:left;color:#000000;">
                                  <div style="text-align:center;margin:8px 24px;">
                                    <a href="[[CTA_URL]]" style="text-decoration:none;display:inline-block;" target="_blank">
                                      <button style="display:inline-flex;align-items:center;gap:12px;padding:12px 60px;background-color:{{ brandboards.b500 }};border:none;border-radius:999px;font-size:16px;font-weight:500;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:{{ brandboards.s25 }};cursor:pointer;">
                                        [[CTA_TEXT]]
                                      </button>
                                    </a>
                                  </div>
                                </div>
                              </td>
                            </tr>

                          </tbody>
                        </table>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>

            </td>
          </tr>
        </tbody>
      </table>

    </div>
  </div>

</body>
</html>
