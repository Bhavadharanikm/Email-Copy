[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NPM_FLAGS = "--include=dev"

[dev]
  command     = "npm run dev"
  port        = 8888
  targetPort  = 3000
  framework   = "#custom"

# Redirect all routes to index.html for React Router (SPA)
# The /.netlify/functions/* redirect is handled by Netlify automatically — do NOT add it here
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"

[context.production.environment]
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NODE_ENV = "preview"
