[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[dev]
  command     = "npm run dev"
  port        = 8888
  targetPort  = 3000
  framework   = "#custom"

# Redirect all routes to index.html for React Router (SPA)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Keep API calls going to Functions, not the SPA redirect
[[redirects]]
  from   = "/.netlify/functions/*"
  to     = "/.netlify/functions/:splat"
  status = 200
  force  = true

[functions]
  node_bundler = "esbuild"

[context.production.environment]
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NODE_ENV = "preview"
